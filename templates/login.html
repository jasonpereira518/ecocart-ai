<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EcoCart AI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234f772d'/%3E%3Cpath d='M8 10h2l3 10h8l3-7H12' stroke='white' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='14' cy='23' r='1.5' fill='white'/%3E%3Ccircle cx='21' cy='23' r='1.5' fill='white'/%3E%3Cpath d='M20 7c2 0 3 1 3 3s-2 4-5 4' stroke='%2390a955' stroke-width='2' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='apple-touch-icon.png') }}">
    <meta property="og:title" content="EcoCart AI">
    <meta property="og:description" content="AI-powered grocery sustainability tracker">
    <meta property="og:type" content="website">
    <script src="https://unpkg.com/lucide@0.344.0"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            text-align: center;
            padding: 3rem;
        }
        .logo-large {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: var(--primary-dark);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="logo-large">
            <i data-lucide="shopping-cart" size="56"></i>
            <i data-lucide="leaf" size="56"></i>
        </div>
        <h1 class="text-2xl mb-2">EcoCart AI</h1>
        <p class="text-muted mb-4">Track your grocery carbon footprint. Shop smarter.</p>
        
        <a href="/login" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem;">
            Continue with Auth0
        </a>
        
        <p class="text-xs text-muted mt-4">
            By continuing, you agree to our Terms of Service and Privacy Policy.
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
