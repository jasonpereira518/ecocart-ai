<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TerraCoach</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            text-align: center;
            padding: 3rem;
        }
        .logo-large {
            font-size: 3rem;
            color: var(--primary-dark);
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="logo-large">
            <i data-lucide="leaf" size="64"></i>
        </div>
        <h1 class="text-2xl mb-2">Welcome to TerraCoach</h1>
        <p class="text-muted mb-4">Your AI-driven journey to a sustainable lifestyle starts here.</p>
        
        <a href="/login" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1rem;">
            Continue with Auth0
        </a>
        
        <p class="text-xs text-muted mt-4">
            By continuing, you agree to our Terms of Service and Privacy Policy.
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
